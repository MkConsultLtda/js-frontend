# CodeQL: repos públicos gravam alertas na aba Security gratuitamente.
# Repositórios privados exigem GitHub Advanced Security para enviar SARIF ao Code Scanning.
# Mantemos upload: never para não falhar quando GHAS não estiver disponível no org/repo.
name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "42 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.com/v1
          BACKEND_API_URL: https://api.example.com/v1

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          # Evita erro "Advanced Security must be enabled" ao subir SARIF em repo privado sem GHAS.
          # Para publicar alertas na aba Security sem mudar esta flag, habilite Advanced Security ou torne o repo público.
          upload: never
