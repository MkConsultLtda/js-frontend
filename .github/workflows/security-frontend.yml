name: Frontend Security

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL pública para DAST (opcional)"
        required: false
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  sast-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2

  dependency-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL

  dependency-scan-strict:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (prod deps strict)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Trivy filesystem scan (strict)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: table
          exit-code: "1"
          severity: MEDIUM,HIGH,CRITICAL

  dast-zap:
    if: github.event_name == 'workflow_dispatch' && inputs.target_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
